<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🚀 NASA Mission Explorer</h1>
            <button id="theme-toggle" class="theme-btn">☀️ Light Mode</button>
        </div>
        <p>Discover the Universe</p>
    </header>

    <main>
        <section id="controls" style="display: none;">
            <input type="text" id="search-bar" placeholder="Search by title...">
            
            <select id="media-filter">
                <option value="all">All Media</option>
                <option value="image">Images Only</option>
                <option value="video">Videos Only</option>
            </select>

            <select id="date-sort">
                <option value="newest">Sort: Newest First</option>
                <option value="oldest">Sort: Oldest First</option>
            </select>

            <input type="date" id="date-picker" title="Click to open calendar" onclick="this.showPicker()">
        </section>

        <div id="loading-spinner">
            <div class="spinner"></div>
            <p style="text-align: center; color: var(--accent-color); font-weight: bold;">Fetching from NASA...</p>
        </div>

        <div id="gallery-container" class="gallery"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
